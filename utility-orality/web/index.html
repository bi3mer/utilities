<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Orality Analyzer</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                background: #0f172a;
                color: #e2e8f0;
                font-family:
                    "Inter",
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            .wrap {
                max-width: 860px;
                margin: 0 auto;
                padding: 32px 20px;
            }
            h1 {
                font-size: 26px;
                font-weight: 700;
                letter-spacing: -0.02em;
            }
            .sub {
                font-size: 14px;
                color: #64748b;
                margin-top: 6px;
            }

            textarea {
                width: 100%;
                min-height: 170px;
                padding: 14px;
                font-size: 14px;
                line-height: 1.7;
                background: #1e293b;
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 8px;
                resize: vertical;
                outline: none;
                font-family: inherit;
                margin-top: 20px;
            }
            textarea:focus {
                border-color: #475569;
            }

            .btn-row {
                display: flex;
                gap: 10px;
                margin-top: 10px;
            }
            .btn {
                padding: 9px 22px;
                font-size: 14px;
                font-weight: 600;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                transition: opacity 0.15s;
            }
            .btn:hover {
                opacity: 0.85;
            }
            .btn-primary {
                background: #3b82f6;
                color: #fff;
            }
            .btn-ghost {
                background: transparent;
                border: 1px solid #334155;
                color: #94a3b8;
                font-weight: 400;
                font-size: 13px;
            }

            .spinner {
                display: none;
                margin-top: 18px;
                color: #94a3b8;
                font-size: 14px;
            }
            .spinner.show {
                display: block;
            }

            /* Score banner */
            .banner {
                display: none;
                align-items: center;
                gap: 20px;
                padding: 18px 24px;
                background: #1e293b;
                border-radius: 10px;
                border: 1px solid #334155;
                margin-top: 24px;
            }
            .banner.show {
                display: flex;
            }
            .ring {
                position: relative;
                width: 72px;
                height: 72px;
                flex-shrink: 0;
            }
            .ring svg {
                transform: rotate(-90deg);
            }
            .ring-val {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                font-weight: 700;
            }
            .banner-text {
                font-size: 18px;
                font-weight: 600;
            }
            .banner-sub {
                font-size: 13px;
                color: #94a3b8;
                margin-top: 2px;
            }

            /* Tabs */
            .tabs {
                display: none;
                gap: 0;
                border-bottom: 1px solid #334155;
                margin-top: 20px;
            }
            .tabs.show {
                display: flex;
            }
            .tab-btn {
                padding: 10px 18px;
                font-size: 13px;
                font-weight: 400;
                border: none;
                border-bottom: 2px solid transparent;
                background: transparent;
                color: #64748b;
                cursor: pointer;
            }
            .tab-btn.active {
                font-weight: 600;
                color: #e2e8f0;
                border-bottom-color: #3b82f6;
            }

            .panel {
                display: none;
                background: #1e293b;
                border-radius: 10px;
                border: 1px solid #334155;
                padding: 20px;
                margin-top: 16px;
            }
            .panel.active {
                display: block;
            }

            /* Legend / filters */
            .legend {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
                margin-bottom: 14px;
            }
            .legend-btn {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 12px;
                padding: 4px 10px;
                border-radius: 20px;
                cursor: pointer;
                border: 1px solid #334155;
                background: transparent;
                color: #94a3b8;
                transition: all 0.15s;
                user-select: none;
            }
            .legend-btn .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }
            .legend-btn.on {
                color: #e2e8f0;
            }

            /* Highlighted text */
            .prose {
                font-size: 15px;
                line-height: 2.1;
                color: #cbd5e1;
                white-space: pre-wrap;
            }
            .sent {
                position: relative;
                border-radius: 3px;
                transition:
                    background 0.15s,
                    box-shadow 0.15s;
            }
            .sent.flagged {
                cursor: pointer;
            }
            .sent.flagged:hover {
                box-shadow: 0 0 0 1px var(--flag-border);
            }
            .sent.dimmed {
                opacity: 0.18;
            }

            .tip {
                display: none;
                position: absolute;
                bottom: calc(100% + 8px);
                left: 50%;
                transform: translateX(-50%);
                background: #0f172a;
                border: 1px solid #334155;
                border-radius: 8px;
                padding: 8px 12px;
                z-index: 100;
                white-space: nowrap;
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
                pointer-events: none;
            }
            .tip::after {
                content: "";
                position: absolute;
                top: 100%;
                left: 50%;
                transform: translateX(-50%);
                border: 6px solid transparent;
                border-top-color: #334155;
            }
            .sent:hover > .tip {
                display: block;
            }
            .tip-row {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 13px;
                color: #e2e8f0;
                margin-bottom: 2px;
            }
            .tip-row:last-child {
                margin-bottom: 0;
            }
            .tip-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            /* Bar chart */
            .bar-group {
                margin-bottom: 10px;
            }
            .bar-label {
                display: flex;
                justify-content: space-between;
                font-size: 13px;
                color: #94a3b8;
                margin-bottom: 3px;
            }
            .bar-label .pct {
                font-size: 12px;
                opacity: 0.7;
            }
            .bar-wrap {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .bar-lo,
            .bar-hi {
                font-size: 11px;
                color: #64748b;
                width: 76px;
                flex-shrink: 0;
            }
            .bar-lo {
                text-align: right;
            }
            .bar-track {
                flex: 1;
                height: 10px;
                background: #0f172a;
                border-radius: 5px;
                overflow: hidden;
            }
            .bar-fill {
                height: 100%;
                border-radius: 5px;
                transition: width 0.5s ease;
            }

            /* Table */
            .tbl {
                width: 100%;
                border-collapse: collapse;
                font-size: 13px;
            }
            .tbl th {
                padding: 10px 8px;
                text-align: left;
                color: #94a3b8;
                border-bottom: 1px solid #334155;
                font-weight: 500;
            }
            .tbl td {
                padding: 8px;
                border-bottom: 1px solid rgba(51, 65, 85, 0.4);
            }
            .tbl tr.flagged-row td {
                background: var(--row-bg);
            }
            .tbl .sent-text {
                max-width: 340px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .tbl .flags-cell {
                font-size: 12px;
                color: #94a3b8;
            }
            .tbl .num {
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <h1>Orality Analyzer</h1>
            <p class="sub">
                Paste your writing below. Flagged sentences highlight — hover
                for details, click categories to filter.
            </p>

            <textarea
                id="input"
                placeholder="Paste or type your text here..."
            ></textarea>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="run()">Analyse</button>
                <button class="btn btn-ghost" onclick="trySample()">
                    Try sample
                </button>
            </div>
            <div class="spinner" id="spinner">Analysing with stanza…</div>

            <div class="banner" id="banner">
                <div class="ring">
                    <svg viewBox="0 0 100 100" width="72" height="72">
                        <circle
                            cx="50"
                            cy="50"
                            r="42"
                            fill="none"
                            stroke="#334155"
                            stroke-width="8"
                        />
                        <circle
                            id="ring-arc"
                            cx="50"
                            cy="50"
                            r="42"
                            fill="none"
                            stroke="#22c55e"
                            stroke-width="8"
                            stroke-dasharray="0 264"
                            stroke-linecap="round"
                        />
                    </svg>
                    <div class="ring-val" id="ring-val">—</div>
                </div>
                <div>
                    <div class="banner-text" id="banner-label">—</div>
                    <div class="banner-sub" id="banner-sub">—</div>
                </div>
            </div>

            <div class="tabs" id="tabs">
                <button class="tab-btn active" data-tab="text">
                    Highlighted Text
                </button>
                <button class="tab-btn" data-tab="bars">Components</button>
                <button class="tab-btn" data-tab="details">
                    All Sentences
                </button>
            </div>

            <div class="panel active" id="panel-text">
                <div class="legend" id="legend"></div>
                <div class="prose" id="prose"></div>
            </div>

            <div class="panel" id="panel-bars">
                <div id="bars"></div>
            </div>

            <div class="panel" id="panel-details">
                <div style="overflow-x: auto">
                    <table class="tbl" id="tbl"></table>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
